# Education System Server Configuration
# This file configures the server settings without modifying source code

# Server Settings
server.port=8080
server.max.threads=50
server.host=localhost

# Database Configuration
# For MySQL:
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/education_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
db.user=root
db.password=root

# For H2 (file-based, for testing):
# db.driver=org.h2.Driver
# db.url=jdbc:h2:./education_db
# db.user=sa
# db.password=

# For PostgreSQL:
# db.driver=org.postgresql.Driver
# db.url=jdbc:postgresql://localhost:5432/education_system
# db.user=postgres
# db.password=postgres

# Security Settings
auth.password.min.length=6
auth.max.failed.attempts=5
auth.lockout.duration.minutes=30
session.timeout.minutes=60

# Application Settings
grade.scale.max=10
grade.scale.min=1
grade.passing.threshold=3.0
attendance.absence.limit=3
semester.current=2025-2026-fall

# Logging
log.level=INFO
log.file=server.log
